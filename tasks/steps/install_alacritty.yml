---
- name: Install Alacritty build dependencies
  become: true
  apt:
    pkg:
      - cmake
      - pkg-config
      - libfontconfig1-dev
      - libxcb-xfixes0-dev
      - libxkbcommon-dev
      - python3
      - desktop-file-utils
    state: present

- name: Install rustup
  shell: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  args:
    creates: ~/.cargo/bin/rustup

- name: Clone Alacritty source
  git:
    repo: https://github.com/alacritty/alacritty.git
    dest: /tmp/alacritty
    depth: 1
    version: master

- name: Build Alacritty
  shell: |
    export PATH="$HOME/.cargo/bin:$PATH"
    cd /tmp/alacritty && cargo build --release
  args:
    creates: /tmp/alacritty/target/release/alacritty

- name: Install Alacritty binary
  become: true
  copy:
    src: /tmp/alacritty/target/release/alacritty
    dest: /usr/local/bin/alacritty
    mode: '0755'
    remote_src: yes

- name: Install Alacritty terminfo
  become: true
  shell: tic -xe alacritty,alacritty-direct /tmp/alacritty/extra/alacritty.info

- name: Install Alacritty desktop entry
  become: true
  shell: |
    cp /tmp/alacritty/extra/logo/alacritty-term.svg /usr/share/pixmaps/Alacritty.svg
    desktop-file-install /tmp/alacritty/extra/linux/Alacritty.desktop
    update-desktop-database

- name: Ensure zsh completions directory exists
  file:
    path: ~/.zsh_functions
    state: directory

- name: Add zsh completions directory to fpath
  lineinfile:
    path: ~/.zshrc
    line: 'fpath+=${ZDOTDIR:-~}/.zsh_functions'
    create: yes

- name: Install Alacritty zsh completions
  copy:
    src: /tmp/alacritty/extra/completions/_alacritty
    dest: ~/.zsh_functions/_alacritty
    remote_src: yes
